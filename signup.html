<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{background:#020617;padding:15px;text-align:center}
.container{padding:20px}
.card{background:#1e293b;padding:20px;border-radius:10px;margin:10px 0}
button{padding:10px;border:none;border-radius:6px;background:#ef4444;color:white}
</style>
</head>
<body>
<header>
<h2>Dashboard</h2>
</header>

<div class="container">
<div class="card">Welcome, <span id="name"></span></div>
<div class="card">Points: 0</div>
<button onclick="logout()">Logout</button>
</div>

<script>
if(localStorage.getItem('login')!=='true'){
location.href='login.html';
}

document.getElementById('name').innerText=localStorage.getItem('user');

function logout(){
localStorage.clear();
location.href='login.html';
}
</script>
</body>
</html>
