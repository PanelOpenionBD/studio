<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#0f172a;color:white;font-family:Arial}
.box{background:#1e293b;padding:30px;border-radius:10px;width:300px}
input,button{width:100%;padding:10px;margin:10px 0;border:none;border-radius:6px}
button{background:#22c55e;color:white}
</style>
</head>
<body>
<div class="box">
<h2>Signup</h2>
<input id="newuser" placeholder="Username">
<input id="newpass" type="password" placeholder="Password">

<!-- RECAPTCHA -->
<div class="g-recaptcha" data-sitekey="6LfswKQsAAAAAGnUpjHVHxqtrH8QUdZhyjXEGjns"></div>

<button onclick="signup()">Create Account</button>
</div>

<script>
function signup(){
let captcha = grecaptcha.getResponse();
if(captcha.length === 0){
alert('Please complete reCAPTCHA');
return;
}

let u=document.getElementById('newuser').value;
let p=document.getElementById('newpass').value;

localStorage.setItem('user',u);
localStorage.setItem('pass',p);

alert('Account created!');
location.href='login.html';
}
</script>
</body>
</html>
