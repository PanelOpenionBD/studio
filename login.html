<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#0f172a;color:white;font-family:Arial}
.box{background:#1e293b;padding:30px;border-radius:10px;width:300px}
input,button{width:100%;padding:10px;margin:10px 0;border:none;border-radius:6px}
button{background:#22c55e;color:white}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p><a href="signup.html">Create Account</a></p>
</div>

<script>
function login(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;

if(u===localStorage.getItem('user') && p===localStorage.getItem('pass')){
localStorage.setItem('login','true');
location.href='dashboard.html';
}else{alert('Wrong login');}
}
</script>
</body>
</html>
